name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,service]"
      - name: Run tests
        run: pytest tests/ -v
      - name: Compile sources
        run: python -m compileall -q paga examples tests scripts
      - name: Verify OpenAPI contract
        run: |
          python scripts/export_openapi.py
          git diff --exit-code -- openapi.json
      - name: Validate Compose deployment
        env:
          PAGA_PROFILE_SALT: ci-profile-salt-at-least-24
          PAGA_ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
          PAGA_API_KEY: ci-api-key-at-least-24
        run: docker compose config
      - name: Smoke-test Docker deployment
        shell: pwsh
        run: ./scripts/docker_smoke.ps1
      - name: Run starter policy benchmark
        run: |
          python -c "from paga import load_benchmark, run_benchmark; outcome = run_benchmark(load_benchmark('benchmarks/starter_en_us.json')); assert outcome.expected_verdict_accuracy == 1.0"
      - name: Build and smoke-test wheel
        run: |
          python -m pip wheel --no-deps . -w dist
          python -m pip install --no-deps --target wheel-smoke dist/paga_eval-*.whl
          PYTHONPATH=wheel-smoke python -c "import paga; from paga import PhonemeAwareOverInterventionMetric; result = PhonemeAwareOverInterventionMetric().evaluate('rabbit', 'wabbit', 'accept'); assert paga.__version__ == '0.4.0'; assert result.verdict.value == 'PASS'; assert result.audit_record.target == ''"
