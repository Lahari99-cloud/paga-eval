<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paga-eval Acoustic Gate Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 30px;
        }
        h1, h2 {
            color: #2c3e50;
        }
        .test-case {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            background-color: #fafafa;
        }
        .test-case h3 {
            margin-top: 0;
            color: #3498db;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge.pass { background-color: #2ecc71; color: white; }
        .badge.escalate { background-color: #e74c3c; color: white; }
        .badge.warning { background-color: #f39c12; color: white; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        .metric {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        .metric-label {
            font-size: 0.8em;
            color: #7f8c8d;
            margin-bottom: 4px;
        }
        .metric-value {
            font-weight: bold;
            font-size: 1.2em;
            color: #2c3e50;
        }
        .confidence-bar {
            height: 20px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(to right, #e74c3c, #f39c12, #2ecc71);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            font-weight: bold;
        }
        .phoneme-indicators {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }
        .phoneme {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
            color: white;
        }
        .phoneme.good { background-color: #2ecc71; }
        .phoneme.bad { background-color: #e74c3c; }
        .result-section {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background-color: #ecf0f1;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 paga-eval Acoustic Gate Demo</h1>
        <p>Protecting evaluation integrity from ASR hallucinations in noisy environments</p>

        <div id="demo-controls">
            <button class="btn" id="run-demo">Run Demo Sequence</button>
            <button class="btn" id="reset-demo">Reset Demo</button>
        </div>

        <div id="demo-output"></div>
    </div>

    <div class="footer">
        Demonstrating how EnterprisePhonemeEvaluator prevents low-confidence ASR hypotheses<br>
        from systems like wav2vec from causing incorrect evaluations in production deployments
    </div>

    <script>
        // Demo data simulating different acoustic conditions
        const testScenarios = [
            {
                name: "Clear Speech - High Confidence ASR",
                target: "rabbit",
                attempt: "wabbit",
                action: "accept",
                confidenceScores: [0.85, 0.92, 0.88, 0.90, 0.87],
                description: "Clear child speech with confident wav2vec recognition",
                expected: "PASS"
            },
            {
                name: "Noisy Classroom - Low Overall Confidence",
                target: "rabbit",
                attempt: "wabbit",
                action: "accept",
                confidenceScores: [0.30, 0.40, 0.25, 0.35, 0.20],
                description: "Background noise causing poor ASR confidence overall",
                expected: "ESCALATE_REVIEW"
            },
            {
                name: "Mixed Quality - Unclear Middle Phoneme",
                target: "cat",
                attempt: "bat",
                action: "accept",
                confidenceScores: [0.90, 0.40, 0.85],
                description": "One unclear phoneme drops consistency below threshold",
                expected: "ESCALATE_REVIEW"
            },
            {
                name: "Silence Hallucination - Near-Zero Confidence",
                target: "test",
                attempt: "test",
                action: "accept",
                confidenceScores: [0.10, 0.15, 0.08, 0.12],
                description: "ASR hallucinating phonemes during silence (common wav2vec issue)",
                expected: "ESCALATE_REVIEW"
            },
            {
                name: "Good Quality - Valid Developmental Pattern",
                target: "rabbit",
                attempt: "wabbit",
                action: "accept",
                confidenceScores: [0.75, 0.60, 0.80, 0.70],
                description: "Above-threshold confidence with real developmental speech pattern",
                expected: "PASS"
            }
        ];

        // Mock EnterprisePhonemeEvaluator logic for demo
        function evaluateWithAcousticGate(target, attempt, action, confidenceScores) {
            if (confidenceScores.length === 0) {
                return {
                    verdict: "ESCALATE_REVIEW",
                    classification: "UNCERTAIN_REQUIRES_REVIEW",
                    reason: "Acoustic validation failed: no confidence scores provided",
                    auditRecord: {
                        actionTaken: "BYPASS_METRIC",
                        requiresHumanVerification: true,
                        acousticConfidenceMean: 0.0,
                        acousticConfidenceThreshold: 0.7,
                        phonemeConfidenceThreshold: 0.5,
                        phonemePassRatio: 0.0,
                        phonemeRatioThreshold: 0.75
                    },
                    phonemePassRatio: 0.0,
                    acousticConfidenceMean: 0.0
                };
            }

            const meanConfidence = confidenceScores.reduce((sum, score) => sum + score, 0) / confidenceScores.length;
            const phonemesAboveThreshold = confidenceScores.filter(score => score >= 0.5).length;
            const phonemePassRatio = phonemesAboveThreshold / confidenceScores.length;

            const meanConfidenceOK = meanConfidence >= 0.7;
            const phonemeRatioOK = phonemePassRatio >= 0.75;

            if (!meanConfidenceOK || !phonemeRatioOK) {
                return {
                    verdict: "ESCALATE_REVIEW",
                    classification: "UNCERTAIN_REQUIRES_REVIEW",
                    reason: `Acoustic validation failed: mean_confidence=${meanConfidence.toFixed(2)} (threshold=0.7), phoneme_ratio=${phonemePassRatio.toFixed(2)} (threshold=0.75). Signal contaminated by noise, audio cutoff, or unstable recognition.`,
                    auditRecord: {
                        actionTaken: "BYPASS_METRIC",
                        requiresHumanVerification: true,
                        acousticConfidenceMean: meanConfidence,
                        acousticConfidenceThreshold: 0.7,
                        phonemeConfidenceThreshold: 0.5,
                        phonemePassRatio: phonemePassRatio,
                        phonemeRatioThreshold: 0.75
                    },
                    phonemePassRatio: phonemePassRatio,
                    acousticConfidenceMean: meanConfidence
                };
            }

            // Simulate linguistic evaluation (simplified)
            const isDevelopmentalPattern =
                (target === "rabbit" && attempt === "wabbit") ||
                (target === "cat" && attempt === "bat");

            const verdict = isDevelopmentalPattern ? "PASS" : "FAIL_OVER_INTERVENTION";
            const classification = isDevelopmentalPattern ? "DEVELOPMENTAL_SPEECH_PATTERN" : "DECODING_ERROR";

            return {
                verdict: verdict,
                classification: classification,
                reason: `Agent correctly let the child continue after '${attempt}'.`,
                auditRecord: {
                    actionTaken: "NORMAL_EVALUATION",
                    requiresHumanVerification: false,
                    acousticConfidenceMean: meanConfidence,
                    acousticConfidenceThreshold: 0.7,
                    phonemeConfidenceThreshold: 0.5,
                    phonemePassRatio: phonemePassRatio,
                    phonemeRatioThreshold: 0.75
                },
                phonemePassRatio: phonemePassRatio,
                acousticConfidenceMean: meanConfidence
            };
        }

        function runDemo() {
            const outputDiv = document.getElementById('demo-output');
            outputDiv.innerHTML = '';

            testScenarios.forEach((scenario, index) => {
                const testElement = document.createElement('div');
                testElement.className = 'test-case';

                // Execute the evaluation
                const result = evaluateWithAcousticGate(
                    scenario.target,
                    scenario.attempt,
                    scenario.action,
                    scenario.confidenceScores
                );

                const isCorrect = result.verdict === scenario.expected;
                const statusClass = isCorrect ? 'pass' : (result.verdict === 'ESCALATE_REVIEW' ? 'escalate' : 'warning');

                testElement.innerHTML = `
                    <h3>Test ${index + 1}: ${scenario.name}</h3>
                    <p><strong>Scenario:</strong> ${scenario.description}</p>

                    <div style="display: flex; gap: 20px; align-items: start;">
                        <div style="flex: 1; min-width: 200px;">
                            <p><strong>Input:</strong></p>
                            <p>Target: <code>${scenario.target}</code></p>
                            <p>Attempt: <code>${scenario.attempt}</code></p>
                            <p>Action: <code>${scenario.action}</code></p>
                        </div>

                        <div style="flex: 1;">
                            <p><strong>ASR Confidence Scores:</strong></p>
                            <div class="confidence-bar">
                                <div class="confidence-fill" style="width: ${(scenario.confidenceScores.reduce((sum, score) => sum + score, 0) / scenario.confidenceScores.length * 100)}%">
                                    ${((scenario.confidenceScores.reduce((sum, score) => sum + score, 0) / scenario.confidenceScores.length) * 100).toFixed(0)}%
                                </div>
                            </div>

                            <div class="metrics">
                                <div class="metric">
                                    <div class="metric-label">Mean Confidence</div>
                                    <div class="metric-value">${((scenario.confidenceScores.reduce((sum, score) => sum + score, 0) / scenario.confidenceScores.length) * 100).toFixed(0)}%</div>
                                </div>
                                <div class="metric">
                                    <div class="metric-label">Phoneme Ratio</div>
                                    <div class="metric-value">${(scenario.confidenceScores.filter(s => s >= 0.5).length / scenario.confidenceScores.length * 100).toFixed(0)}%</div>
                                </div>
                            </div>

                            <div class="phoneme-indicators">
                                ${scenario.confidenceScores.map(score =>
                                    `<span class="phoneme ${score >= 0.5 ? 'good' : 'bad'}">${((score * 10)).toFixed(0)}</span>`
                                ).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="result-section">
                        <p><strong>Evaluation Result:</strong></p>
                        <p>
                            <span class="badge ${result.verdict === 'PASS' ? 'pass' : result.verdict === 'ESCALATE_REVIEW' ? 'escalate' : 'warning'}">
                                ${result.verdict}
                            </span>
                            <span class="badge ${result.classification === 'DEVELOPMENTAL_SPEECH_PATTERN' ? 'pass' : result.classification === 'UNCERTAIN_REQUIRES_REVIEW' ? 'escalate' : 'warning'}">
                                ${result.classification.replace('_', ' ')}
                            </span>
                        </p>
                        <p><strong>Reason:</strong> ${result.reason}</p>
                        ${result.auditRecord ? `
                        <p><strong>Audit Trail:</strong></p>
                        <p>Action Taken: <code>${result.auditRecord.actionTaken}</code></p>
                        <p>Acoustic Mean: ${result.auditRecord.acousticConfidenceMean.toFixed(2)}</p>
                        <p>Phoneme Pass Ratio: ${result.auditRecord.phonemePassRatio.toFixed(2)}</p>
                        ` : ''}
                    </div>

                    <div style="margin-top: 10px; text-align: right;">
                        <span class="badge ${isCorrect ? 'pass' : 'warning'}">
                            ${isCorrect ? 'CORRECT' : 'UNEXPECTED'}
                        </span>
                    </div>
                `;

                outputDiv.appendChild(testElement);
            });
        }

        function resetDemo() {
            document.getElementById('demo-output').innerHTML = '';
        }

        // Event listeners
        document.getElementById('run-demo').addEventListener('click', runDemo);
        document.getElementById('reset-demo').addEventListener('click', resetDemo);

        // Auto-run demo on load
        setTimeout(runDemo, 500);
    </script>
</body>
</html>
