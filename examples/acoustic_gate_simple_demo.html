<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paga-eval // Interactive Acoustic Gate Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }
        h1 { margin-top: 0; color: #38bdf8; font-size: 24px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #cbd5e1; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .scores-container {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .score-slider-wrapper {
            flex: 1;
            text-align: center;
            background: #0f172a;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #334155;
        }
        .score-slider-wrapper label { font-size: 11px; margin-bottom: 4px; color: #94a3b8; }
        .score-slider-wrapper input[type="range"] { width: 100%; }
        .score-val { font-size: 12px; font-weight: bold; color: #38bdf8; }
        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background: #0369a1; }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            border-left: 5px solid transparent;
        }
        .verdict-PASS { background: #064e3b; border-color: #10b981; border-left: 5px solid #10b981; }
        .verdict-FAIL_OVER_INTERVENTION { background: #7f1d1d; border-color: #ef4444; border-left: 5px solid #ef4444; }
        .verdict-ESCALATE_REVIEW { background: #78350f; border-color: #f59e0b; border-left: 5px solid #f59e0b; }
        .result-title { font-weight: bold; font-size: 18px; margin-bottom: 8px; }
        .result-meta { font-family: monospace; font-size: 13px; color: #cbd5e1; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ paga-eval Simulator</h>
    <div class="subtitle">Interactive Acoustic Gate & Phonological Alignment Simulation Layer (NIST AI RMF Compliant)</div>

    <div class="form-group">
        <label>Reading Target Word</label>
        <input type="text" id="target" value="rabbit">
    </div>

    <div class="form-group">
        <label>Child Speech-To-Text Output</label>
        <input type="text" id="attempt" value="wabbit">
    </div>

    <div class="form-group">
        <label>Tutor Agent Action Taken</label>
        <select id="action">
            <option value="continue">continue (Stay Silent & Wait)</option>
            <option value="hint" selected>hint (Interrupt with Correction/Prompt)</option>
            <option value="intervene">intervene (Direct Intervention)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Wav2Vec / Phoneme-Level Acoustic Confidence Scores</label>
        <div class="subtitle" style="margin-bottom: 8px;">Simulating a noisy classroom. Adjust sliders to trip the Acoustic Gate.</div>
        <div class="scores-container">
            <div class="score-slider-wrapper">
                <label>Phoneme 1</label>
                <input type="range" id="p1" min="0" max="100" value="95" oninput="updateScoreLabels()">
                <div class="score-val" id="p1_val">0.95</div>
            </div>
            <div class="score-slider-wrapper">
                <label>Phoneme 2</label>
                <input type="range" id="p2" min="0" max="100" value="92" oninput="updateScoreLabels()">
                <div class="score-val" id="p2_val">0.92</div>
            </div>
            <div class="score-slider-wrapper">
                <label>Phoneme 3</label>
                <input type="range" id="p3" min="0" max="100" value="88" oninput="updateScoreLabels()">
                <div class="score-val" id="p3_val">0.88</div>
            </div>
            <div class="score-slider-wrapper">
                <label>Phoneme 4</label>
                <input type="range" id="p4" min="0" max="100" value="94" oninput="updateScoreLabels()">
                <div class="score-val" id="p4_val">0.94</div>
            </div>
            <div class="score-slider-wrapper">
                <label>Phoneme 5</label>
                <input type="range" id="p5" min="0" max="100" value="25" oninput="updateScoreLabels()">
                <div class="score-val" id="p5_val">0.25</div>
            </div>
        </div>
    </div>

    <button onclick="evaluatePipeline()">Execute Evaluation Pipeline</button>

    <div id="result" class="result-box">
        <div class="result-title" id="res_verdict"></div>
        <div class="result-meta" id="res_meta"></div>
    </div>
</div>

<script>
    function updateScoreLabels() {
        for(let i=1; i<=5; i++) {
            document.getElementById(`p${i}_val`).innerText = (document.getElementById(`p${i}`).value / 100).toFixed(2);
        }
    }

    function evaluatePipeline() {
        const target = document.getElementById('target').value.trim().toLowerCase();
        const attempt = document.getElementById('attempt').value.trim().toLowerCase();
        const action = document.getElementById('action').value;

        // Fetch values from sliders
        const scores = [];
        for(let i=1; i<=5; i++) {
            scores.push(document.getElementById(`p${i}`).value / 100);
        }

        // 1. Acoustic Gate Processing Logic
        const sum = scores.reduce((a, b) => a + b, 0);
        const meanConfidence = sum / scores.length;

        const MIN_MEAN = 0.72;
        const MIN_PHONEME = 0.50;
        const MIN_RATIO = 0.80;

        const failingPhonemes = scores.filter(s => s < MIN_PHONEME).length;
        const passingRatio = (scores.length - failingPhonemes) / scores.length;

        const resultBox = document.getElementById('result');
        resultBox.className = 'result-box'; // reset classes
        resultBox.style.display = 'block';

        // Check Multi-Layer Acoustic Failures
        if (meanConfidence < MIN_MEAN || passingRatio < MIN_RATIO) {
            resultBox.classList.add('verdict-ESCALATE_REVIEW');
            document.getElementById('res_verdict').innerText = "⚠️ ESCALATE_REVIEW";
            document.getElementById('res_meta').innerHTML = `
                <strong>Classification:</strong> UNCERTAIN_REQUIRES_REVIEW<br>
                <strong>Reasoning:</strong> Acoustic verification layer failed. Signal contaminated.<br>
                <strong>Metrics:</strong> Mean Conf: ${meanConfidence.toFixed(2)} (Min: ${MIN_MEAN}) | Valid Phoneme Ratio: ${(passingRatio*100).toFixed(0)}% (Min: ${(MIN_RATIO*100).toFixed(0)}%)<br>
                <strong>NIST Action:</strong> Bypassed linguistic rules to prevent metric contamination.
            `;
            return;
        }

        // 2. Linguistic and Policy Evaluation Logic
        let classification = "decoding_error";
        let rationale = "Child misread the target token.";

        // Handle developmental gliding matching our clinical registry
        const isGliding = (target === "rabbit" && attempt === "wabbit") || (target === "three" && attempt === "free");

        if (target === attempt) {
            classification = "clean_reading";
            rationale = "Exact phonological match.";
        } else if (isGliding) {
            classification = "developmental_speech_pattern";
            rationale = "Age-appropriate developmental articulation variation (liquid gliding/fronting). Not a decoding failure.";
        }

        // Determine Verdict
        let verdict = "PASS";
        if ((classification === "clean_reading" || classification === "developmental_speech_pattern") && (action === "hint" || action === "intervene")) {
            verdict = "FAIL_OVER_INTERVENTION";
        }

        // Render Outputs
        resultBox.classList.add(`verdict-${verdict}`);
        document.getElementById('res_verdict').innerText = verdict === "PASS" ? "✅ PASS" : "❌ FAIL_OVER_INTERVENTION";

        document.getElementById('res_meta').innerHTML = `
            <strong>Classification:</strong> ${classification.toUpperCase()}<br>
            <strong>Applied Guidance Rationale:</strong> ${rationale}<br>
            <strong>Agent Action Evaluated:</strong> ${action}<br>
            <strong>Acoustic Status:</strong> CLEAN (Mean Conf: ${meanConfidence.toFixed(2)})<br>
            <strong>Audit Footprint:</strong> NIST AI RMF Compliant Log generated successfully.
        `;
    }
</script>

</body>
</html>
