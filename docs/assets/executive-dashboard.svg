<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">paga-eval executive dashboard</title>
  <desc id="desc">A leadership dashboard showing explainability, privacy-safe audits, human-review routing, policy versioning, and the four evaluator showcase scenarios.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8fb"/>
      <stop offset="100%" stop-color="#e8f1f5"/>
    </linearGradient>
    <style>
      .headline { fill:#11334d; font:700 48px Arial, sans-serif; }
      .subhead { fill:#547487; font:400 23px Arial, sans-serif; }
      .card { fill:#ffffff; stroke:#d6e3e9; stroke-width:2; rx:18; }
      .label { fill:#527083; font:700 17px Arial, sans-serif; letter-spacing:1px; }
      .metric { fill:#11334d; font:700 45px Arial, sans-serif; }
      .body { fill:#547487; font:400 18px Arial, sans-serif; }
      .row { fill:#11334d; font:700 20px Arial, sans-serif; }
      .small { fill:#547487; font:400 16px Arial, sans-serif; }
      .pass { fill:#dff5e9; }
      .fail { fill:#ffe3e0; }
      .review { fill:#fff1cc; }
      .privacy { fill:#e4efff; }
      .pill-text { fill:#25445a; font:700 16px Arial, sans-serif; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#background)"/>
  <text x="84" y="90" class="headline">Executive proof points</text>
  <text x="84" y="133" class="subhead">What a product, responsible-AI, or institutional leader can inspect in the reference workflow</text>

  <rect x="84" y="188" width="330" height="180" class="card"/>
  <text x="116" y="235" class="label">EXPLAINABILITY</text>
  <text x="116" y="303" class="metric">Every decision</text>
  <text x="116" y="339" class="body">Reason, policy version, rule IDs</text>

  <rect x="449" y="188" width="330" height="180" class="card"/>
  <text x="481" y="235" class="label">PRIVACY DEFAULT</text>
  <text x="481" y="303" class="metric">Omitted</text>
  <text x="481" y="339" class="body">Transcript text in durable audits</text>

  <rect x="814" y="188" width="330" height="180" class="card"/>
  <text x="846" y="235" class="label">HUMAN OVERSIGHT</text>
  <text x="846" y="303" class="metric">Explicit</text>
  <text x="846" y="339" class="body">Escalation for ambiguous cases</text>

  <rect x="1179" y="188" width="330" height="180" class="card"/>
  <text x="1211" y="235" class="label">POLICY GOVERNANCE</text>
  <text x="1211" y="303" class="metric">Versioned</text>
  <text x="1211" y="339" class="body">Reviewable institution rule packs</text>

  <rect x="84" y="414" width="1425" height="385" class="card"/>
  <text x="116" y="466" class="label">SHOWCASE SCENARIO MATRIX</text>
  <text x="116" y="520" class="row">Tutor behavior</text>
  <text x="610" y="520" class="row">Evaluation outcome</text>
  <text x="1045" y="520" class="row">Institutional control</text>
  <line x1="116" y1="542" x2="1476" y2="542" stroke="#d6e3e9" stroke-width="2"/>

  <text x="116" y="594" class="row">Accept: rabbit -> wabbit</text>
  <rect x="610" y="564" width="245" height="42" rx="21" class="pass"/>
  <text x="634" y="591" class="pill-text">PASS DEVELOPMENTAL</text>
  <text x="1045" y="594" class="small">Applied rule is visible</text>

  <text x="116" y="660" class="row">Correct: rabbit -> wabbit</text>
  <rect x="610" y="630" width="265" height="42" rx="21" class="fail"/>
  <text x="634" y="657" class="pill-text">FAIL OVER-INTERVENTION</text>
  <text x="1045" y="660" class="small">Avoid unnecessary correction</text>

  <text x="116" y="726" class="row">Accept: cat -> bat</text>
  <rect x="610" y="696" width="238" height="42" rx="21" class="review"/>
  <text x="634" y="723" class="pill-text">ESCALATE REVIEW</text>
  <text x="1045" y="726" class="small">Keep uncertainty supervised</text>

  <text x="116" y="792" class="row">Accept: rabbit -> zebra</text>
  <rect x="610" y="762" width="252" height="42" rx="21" class="privacy"/>
  <text x="634" y="789" class="pill-text">UNDER-INTERVENTION</text>
  <text x="1045" y="792" class="small">Flag likely decoding errors</text>

  <text x="84" y="857" class="small">Reference-service proof points, not clinical validation or institution-specific production certification.</text>
</svg>
